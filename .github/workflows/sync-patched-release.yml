name: Sync upstream for patching

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:
    inputs:
      tag:
        description: 'Specific upstream tag to patch (e.g. v6.9.9). Leave empty for auto-detect.'
        required: false
        type: string
      force_sync:
        description: 'Force sync even if upstream/main has no new commits.'
        required: false
        type: boolean
        default: false

concurrency:
  group: sync-patched-release
  cancel-in-progress: false

env:
  UPSTREAM_REPO: https://github.com/router-for-me/CLIProxyAPI.git

permissions:
  contents: write
  issues: write

jobs:
  sync-patched-release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate workflow token
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error::Missing required secret GH_PAT"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream "$UPSTREAM_REPO" || true
          git fetch upstream --tags --force
          git fetch origin --tags --force

      # ──────────────────────────────────────────────
      # Phase 1: Sync main + rebuild patched
      # ──────────────────────────────────────────────

      - name: Check for upstream main updates
        id: check-main
        run: |
          UPSTREAM_HEAD=$(git rev-parse upstream/main)
          ORIGIN_HEAD=$(git rev-parse origin/main)
          if [ "$UPSTREAM_HEAD" = "$ORIGIN_HEAD" ]; then
            echo "has_main_update=false" >> "$GITHUB_OUTPUT"
            echo "✓ upstream/main matches origin/main — no new commits."
          else
            echo "has_main_update=true" >> "$GITHUB_OUTPUT"
            echo "✗ upstream/main has new commits."
          fi

      - name: Sync main from upstream
        if: steps.check-main.outputs.has_main_update == 'true' || github.event.inputs.force_sync == 'true'
        run: |
          git checkout -B main origin/main
          git reset --hard upstream/main
          git push origin main --force-with-lease

      - name: Rebase fix/*, refactor/*, and ci/* branches onto main
        if: steps.check-main.outputs.has_main_update == 'true' || github.event.inputs.force_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          create_issue_once() {
            local title="$1"
            local body="$2"
            local existing_issue

            existing_issue="$({
              gh issue list --state open --json number,title \
                | python3 -c 'import json, sys; title = sys.argv[1]; print(next((str(issue["number"]) for issue in json.load(sys.stdin) if issue["title"] == title), ""))' "$title"
            } 2>/dev/null || true)"

            if [ -n "$existing_issue" ]; then
              echo "Open issue already exists for: $title (#$existing_issue)"
              return 0
            fi

            gh issue create --title "$title" --body "$body" --label conflict --label automated \
              || gh issue create --title "$title" --body "$body" \
              || echo "Failed to create issue"
          }

          for branch in $(git branch -r | grep -E 'origin/(fix|refactor|ci)/' | sed 's| *origin/||'); do
            echo "::group::Rebasing $branch onto main"
            git checkout -B "$branch" "origin/$branch"
            if ! git rebase origin/main; then
              echo "::warning::Rebase failed for $branch"
              git rebase --abort

              issue_title="[rebase-conflict] $branch cannot rebase onto main"
              issue_body="$(cat <<EOF
          ## Rebase Conflict

          **Branch**: \`$branch\`
          **Target**: \`main\` (synced from upstream)
          **Detected by**: sync-patched-release workflow

          ### How to resolve

          \`\`\`bash
          git checkout $branch
          git rebase origin/main
          # Resolve conflicts, then:
          git rebase --continue
          git push origin $branch --force-with-lease
          \`\`\`
          EOF
          )"
              create_issue_once "$issue_title" "$issue_body"
            else
              git push origin "$branch" --force-with-lease
              echo "✓ Rebased and pushed $branch"

              # Close any existing rebase-conflict issue for this branch
              gh issue list --state open --json number,title \
                | python3 -c 'import json, sys; branch = sys.argv[1]; [print(issue["number"]) for issue in json.load(sys.stdin) if "[rebase-conflict]" in issue["title"] and branch in issue["title"]]' "$branch" 2>/dev/null \
                | while read -r num; do
                    gh issue close "$num" --comment "Rebase conflict resolved by sync-patched-release workflow." || true
                  done
            fi
            echo "::endgroup::"
          done

      - name: Rebuild patched branch
        if: steps.check-main.outputs.has_main_update == 'true' || github.event.inputs.force_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          create_issue_once() {
            local title="$1"
            local body="$2"
            local existing_issue

            existing_issue="$({
              gh issue list --state open --json number,title \
                | python3 -c 'import json, sys; title = sys.argv[1]; print(next((str(issue["number"]) for issue in json.load(sys.stdin) if issue["title"] == title), ""))' "$title"
            } 2>/dev/null || true)"

            if [ -n "$existing_issue" ]; then
              echo "Open issue already exists for: $title (#$existing_issue)"
              return 0
            fi

            gh issue create --title "$title" --body "$body" --label conflict --label automated \
              || gh issue create --title "$title" --body "$body" \
              || echo "Failed to create issue"
          }

          git checkout -B patched origin/patched
          git reset --hard origin/main

          for branch in $(git branch -r | grep -E 'origin/(fix|refactor|ci)/' | sed 's| *origin/||'); do
            echo "::group::Merging $branch into patched"
            if ! git merge --no-edit "origin/$branch"; then
              echo "::warning::Merge conflict with $branch into patched"
              git merge --abort

              issue_title="[merge-conflict] $branch cannot merge into patched"
              issue_body="$(cat <<EOF
          ## Merge Conflict

          **Source**: \`$branch\`
          **Target**: \`patched\` (default branch)
          **Detected by**: sync-patched-release workflow

          ### How to resolve

          \`\`\`bash
          git checkout patched
          git reset --hard origin/main
          git merge --no-edit origin/$branch
          # Resolve conflicts, then:
          git push origin patched --force-with-lease
          \`\`\`
          EOF
          )"
              create_issue_once "$issue_title" "$issue_body"
            else
              echo "✓ Merged $branch"

              gh issue list --state open --json number,title \
                | python3 -c 'import json, sys; title = sys.argv[1]; [print(issue["number"]) for issue in json.load(sys.stdin) if issue["title"] == title]' "[merge-conflict] $branch cannot merge into patched" 2>/dev/null \
                | while read -r num; do
                    gh issue close "$num" --comment "Patched merge conflict resolved by sync-patched-release workflow." || true
                  done
            fi
            echo "::endgroup::"
          done

          git push origin patched --force-with-lease

      # ──────────────────────────────────────────────
      # Phase 2: Create patched tags for new upstream releases
      # ──────────────────────────────────────────────

      - name: Detect new upstream tags
        id: check-tags
        run: |
          NEW_TAGS=""

          if [ -n "${{ github.event.inputs.tag || '' }}" ]; then
            # Manual mode: use specified tag
            NEW_TAGS="${{ github.event.inputs.tag }}"
          else
            # Auto mode: consider only the latest upstream tag.
            # Never backfill older tags automatically.
            mapfile -t candidate_tags < <(git tag -l 'v*' | grep -v '\-patched' | sort -V)
            if [ ${#candidate_tags[@]} -gt 0 ]; then
              tag="${candidate_tags[$((${#candidate_tags[@]} - 1))]}"
              patched_tag="${tag}-patched"
              if ! git rev-parse "$patched_tag" >/dev/null 2>&1; then
                NEW_TAGS="$tag"
              fi
            fi
          fi

          NEW_TAGS=$(echo "$NEW_TAGS" | xargs)  # trim whitespace
          if [ -n "$NEW_TAGS" ]; then
            echo "has_new_tags=true" >> "$GITHUB_OUTPUT"
            echo "new_tags=$NEW_TAGS" >> "$GITHUB_OUTPUT"
            echo "✗ New tags to patch: $NEW_TAGS"
          else
            echo "has_new_tags=false" >> "$GITHUB_OUTPUT"
            echo "✓ No new upstream tags to patch."
          fi

      - name: Create patched tags
        if: steps.check-tags.outputs.has_new_tags == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          TAGS="${{ steps.check-tags.outputs.new_tags }}"

          create_issue_once() {
            local title="$1"
            local body="$2"
            local existing_issue

            existing_issue="$({
              gh issue list --state open --json number,title \
                | python3 -c 'import json, sys; title = sys.argv[1]; print(next((str(issue["number"]) for issue in json.load(sys.stdin) if issue["title"] == title), ""))' "$title"
            } 2>/dev/null || true)"

            if [ -n "$existing_issue" ]; then
              echo "Open issue already exists for: $title (#$existing_issue)"
              return 0
            fi

            gh issue create --title "$title" --body "$body" --label conflict --label automated \
              || gh issue create --title "$title" --body "$body" \
              || echo "Failed to create issue"
          }

          for tag in $TAGS; do
            patched_tag="${tag}-patched"

            # Skip if already exists
            if git rev-parse "$patched_tag" >/dev/null 2>&1; then
              echo "Skipping $tag: $patched_tag already exists"
              continue
            fi

            echo "::group::Creating $patched_tag from $tag"

            # Verify tag exists
            if ! git rev-parse "$tag" >/dev/null 2>&1; then
              echo "::warning::Tag $tag not found, skipping"
              echo "::endgroup::"
              continue
            fi

            # Create temporary branch from tag
            git checkout -b "tmp-patched-${tag}" "$tag"

            # Merge all fix/*, refactor/*, and ci/* branches
            failed=0
            conflict_branch=""
            for branch in $(git branch -r | grep -E 'origin/(fix|refactor|ci)/' | sed 's| *origin/||'); do
              echo "Merging $branch..."
              if ! git merge --no-edit "origin/$branch"; then
                echo "::warning::Merge conflict: $branch vs $tag"
                git merge --abort
                failed=1
                conflict_branch="$branch"
                break
              fi
            done

            if [ "$failed" -eq 1 ]; then
              git checkout -B patched origin/patched 2>/dev/null || git checkout --detach HEAD
              git branch -D "tmp-patched-${tag}" || true

              issue_title="[patched-release-conflict] $conflict_branch conflicts with $tag"
              issue_body="$(cat <<EOF
          ## Patched Release Merge Conflict

          **Tag**: \`$tag\`
          **Conflicting branch**: \`$conflict_branch\`
          **Target**: \`$patched_tag\`
          **Detected by**: sync-patched-release workflow

          ### How to resolve

          \`\`\`bash
          git fetch upstream --tags
          git checkout -b tmp-patched-$tag $tag
          git merge --no-edit origin/$conflict_branch
          # Resolve conflicts, then:
          git tag $patched_tag
          git push origin $patched_tag
          git checkout main
          git branch -D tmp-patched-$tag
          \`\`\`
          EOF
          )"
              create_issue_once "$issue_title" "$issue_body"

              echo "::endgroup::"
              continue
            fi

            # Tag and push
            git tag "$patched_tag"
            git push origin "$patched_tag"

            # Cleanup
            git checkout -B patched origin/patched 2>/dev/null || git checkout --detach HEAD
            git branch -D "tmp-patched-${tag}"

            gh issue list --state open --json number,title \
              | python3 -c 'import json, sys; tag = sys.argv[1]; [print(issue["number"]) for issue in json.load(sys.stdin) if issue["title"].startswith("[patched-release-conflict] ") and issue["title"].endswith(f" conflicts with {tag}")]' "$tag" 2>/dev/null \
              | while read -r num; do
                  gh issue close "$num" --comment "Patched release conflict resolved by sync-patched-release workflow." || true
                done

            echo "✓ Created and pushed $patched_tag"
            echo "::endgroup::"
          done
